<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="theme-color" content="#f3e8ff">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <title>Her Motion Gallery 💜</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;

            background:
                linear-gradient(135deg,
                    #ffffff,
                    #f3e8ff,
                    #ede9fe);

            font-family: Arial, sans-serif;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .frame {
            position: relative;

            width: 100vw;
            height: 100vh;

            overflow: hidden;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* START */

        .start-screen {
            position: fixed;
            inset: 0;

            display: flex;
            justify-content: center;
            align-items: center;

            background:
                linear-gradient(135deg,
                    #ffffff,
                    #f3e8ff,
                    #ede9fe);

            z-index: 999;

            transition: 1s ease;
        }

        .start-btn {
            padding: 18px 42px;

            border: none;
            border-radius: 999px;

            background:
                linear-gradient(135deg,
                    #c084fc,
                    #9333ea);

            color: white;

            font-size: 20px;
            font-weight: bold;

            cursor: pointer;

            box-shadow:
                0 20px 60px rgba(168, 85, 247, .35);

            transition: .3s ease;
        }

        .start-btn:hover {
            transform: scale(1.05);
        }

        /* IMAGES */

        img {
            position: absolute;

            left: 50%;
            top: 50%;

            transform:
                translate(-50%, -50%) scale(1);

            max-width: 92vw;
            max-height: 82vh;

            width: auto;
            height: auto;

            object-fit: contain;

            border-radius: 28px;

            opacity: 0;

            box-shadow:
                0 30px 80px rgba(106, 13, 173, .25),
                0 0 40px rgba(168, 85, 247, .12);

            transition:
                transform 1.8s cubic-bezier(.16, 1, .3, 1),
                opacity 1.5s ease,
                filter 1.8s ease;

            will-change:
                transform,
                opacity,
                filter;
        }

        /* CAPTION */

        .caption {
            position: absolute;

            bottom: 30px;

            width: 100%;

            text-align: center;

            color: #6a0dad;

            font-size: clamp(18px, 4vw, 26px);

            font-weight: bold;

            letter-spacing: 1px;

            z-index: 100;

            transition: .8s ease;

            text-shadow:
                0 2px 12px rgba(255, 255, 255, .9);
        }

        /* GLOW */

        .glow {
            position: absolute;

            width: 700px;
            height: 700px;

            border-radius: 50%;

            background:
                radial-gradient(circle,
                    rgba(168, 85, 247, .18),
                    transparent 70%);

            filter: blur(60px);

            animation:
                pulse 6s ease-in-out infinite alternate;
        }

        @keyframes pulse {

            from {
                transform: scale(1);
            }

            to {
                transform: scale(1.25);
            }

        }

        /* FLOAT */

        @keyframes floating {

            0% {
                transform:
                    translate(-50%, -50%) translateY(0px);
            }

            50% {
                transform:
                    translate(-50%, -50%) translateY(-10px);
            }

            100% {
                transform:
                    translate(-50%, -50%) translateY(0px);
            }

        }

        .floating {
            animation:
                floating 5s ease-in-out infinite;
        }

        /* STARS */

        .star {
            position: absolute;

            color: white;

            text-shadow:
                0 0 10px white,
                0 0 20px white;

            animation:
                twinkle linear infinite;
        }

        @keyframes twinkle {

            0% {
                opacity: 0;
                transform: scale(.5);
            }

            50% {
                opacity: 1;
                transform: scale(1.2);
            }

            100% {
                opacity: 0;
                transform: scale(.5);
            }

        }

        /* MOON */

        .moon {
            position: absolute;

            top: 50px;
            right: 50px;

            width: 90px;
            height: 90px;

            border-radius: 50%;

            background:
                radial-gradient(circle at 30% 30%,
                    #fff,
                    #f5f3ff,
                    #d8b4fe);

            box-shadow:
                0 0 50px rgba(255, 255, 255, .8);

            opacity: .8;
        }

        /* MOBILE */

        @media(max-width:768px) {

            img {
                max-width: 95vw;
                max-height: 74vh;

                border-radius: 22px;
            }

            .moon {
                width: 70px;
                height: 70px;

                top: 30px;
                right: 25px;
            }

        }
    </style>

</head>

<body>

    <!-- START -->

    <div class="start-screen" id="startScreen">

        <button class="start-btn" onclick="startGallery()">
            💜 Tap To Start 💜
        </button>

    </div>

    <!-- FRAME -->

    <div class="frame">

        <div class="glow"></div>

        <div class="moon"></div>

        <img id="photo1" src="image1.jfif">
        <img id="photo2">

        <div class="caption" id="caption">
            💜 Her 💜
        </div>

    </div>

    <!-- MUSIC -->

    <audio id="music" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script>

        const images = [
            "image1.jfif",
            "image2.jfif",
            "image3.jfif",
            "image4.jfif",
            "image5.jfif",
            "image6.jfif",
            "image7.jfif",
            "image8.jfif",
            "image9.jfif",
            "image10.jfif"
        ];

        const captions = [
            "💜 Her smile",
            "✨ Soft moments",
            "🌸 Pure beauty",
            "💫 My favorite view",
            "💖 Always her",
            "🌙 Dream girl",
            "🌷 Little memories",
            "💜 Just her again",
            "✨ Endless beauty",
            "💜 My person"
        ];

        /* LINKED TRANSITIONS */

        const transitions = [

            {
                out:
                    "translate(-150%, -50%) scale(.9)",
                in:
                    "translate(50%, -50%) scale(.9)"
            },

            {
                out:
                    "translate(50%, -50%) scale(.9)",
                in:
                    "translate(-150%, -50%) scale(.9)"
            },

            {
                out:
                    "translate(-50%, -180%) rotate(-10deg) scale(.8)",
                in:
                    "translate(-50%, 80%) rotate(10deg) scale(.8)"
            },

            {
                out:
                    "translate(-50%, 80%) rotate(10deg) scale(.8)",
                in:
                    "translate(-50%, -180%) rotate(-10deg) scale(.8)"
            },

            {
                out:
                    "translate(-50%, -50%) scale(1.8) rotate(15deg)",
                in:
                    "translate(-50%, -50%) scale(.2) rotate(-15deg)"
            },

            {
                out:
                    "translate(-120%, -50%) rotate(-25deg) scale(.6)",
                in:
                    "translate(20%, -50%) rotate(25deg) scale(.6)"
            },

            {
                out:
                    "translate(20%, -50%) rotate(25deg) scale(.6)",
                in:
                    "translate(-120%, -50%) rotate(-25deg) scale(.6)"
            },

            {
                out:
                    "translate(-50%, -50%) rotateY(90deg) scale(.7)",
                in:
                    "translate(-50%, -50%) rotateY(-90deg) scale(.7)"
            }

        ];

        let index = 0;

        const photo1 =
            document.getElementById("photo1");

        const photo2 =
            document.getElementById("photo2");

        const caption =
            document.getElementById("caption");

        let active = photo1;
        let next = photo2;

        /* CHANGE IMAGE */

        function transitionImage() {

            index = (index + 1) % images.length;

            const transition =
                transitions[
                Math.floor(Math.random() * transitions.length)
                ];

            next.src = images[index];

            next.classList.remove("floating");

            next.style.transition = "none";

            next.style.opacity = "0";

            next.style.filter =
                "blur(18px) brightness(1.2)";

            next.style.transform =
                transition.in;

            void next.offsetWidth;

            next.style.transition =
                `
                transform 1.8s cubic-bezier(.16,1,.3,1),
                opacity 1.5s ease,
                filter 1.8s ease
                `;

            requestAnimationFrame(() => {

                /* NEW IMAGE ENTER */

                next.style.opacity = "1";

                next.style.filter =
                    "blur(0px) brightness(1)";

                next.style.transform =
                    "translate(-50%, -50%) scale(1)";

                /* OLD IMAGE EXIT */

                active.style.opacity = "0";

                active.style.filter =
                    "blur(12px)";

                active.style.transform =
                    transition.out;

            });

            /* FLOATING */

            setTimeout(() => {

                next.classList.add("floating");

            }, 1800);

            /* CAPTION */

            caption.style.opacity = "0";

            setTimeout(() => {

                caption.innerText =
                    captions[index];

                caption.style.opacity = "1";

            }, 700);

            [active, next] = [next, active];

        }

        /* START */

        function startGallery() {

            const music =
                document.getElementById("music");

            music.play().catch(() => { });

            const screen =
                document.getElementById("startScreen");

            screen.style.opacity = "0";

            setTimeout(() => {

                screen.style.display = "none";

            }, 1000);

            active.style.opacity = "1";

            active.classList.add("floating");

            createStars();

            setInterval(transitionImage, 4500);

            if (document.documentElement.requestFullscreen) {

                document.documentElement
                    .requestFullscreen()
                    .catch(() => { });

            }

        }

        /* STARS */

        function createStars() {

            for (let i = 0; i < 40; i++) {

                const star =
                    document.createElement("div");

                star.classList.add("star");

                star.innerHTML = "✦";

                star.style.left =
                    Math.random() * 100 + "vw";

                star.style.top =
                    Math.random() * 100 + "vh";

                star.style.fontSize =
                    (8 + Math.random() * 18) + "px";

                star.style.animationDuration =
                    (2 + Math.random() * 4) + "s";

                star.style.animationDelay =
                    Math.random() * 5 + "s";

                document.body.appendChild(star);

            }

        }

    </script>

</body>

</html>
